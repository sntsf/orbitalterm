name: Publish to Launchpad PPA

# Builds a signed Debian SOURCE package per Ubuntu series and uploads it to a
# Launchpad PPA, which then compiles the binaries. The frontend (dist/) is
# pre-built here and the Rust crates are vendored, so the Launchpad builders
# compile fully offline (no Node needed there).
#
# Dormant until you opt in: set repository variable ENABLE_PPA = true and add
# the secrets below.
#
# Required repository secrets:
#   PPA_GPG_PRIVATE_KEY  – ASCII-armored private key registered on Launchpad
#   PPA_GPG_PASSPHRASE   – passphrase for that key
#   PPA_NAME             – e.g. "your-lp-user/orbitalterm"
#   PPA_MAINTAINER       – e.g. "OrbitalTerm <anderson.sflorez@gmail.com>"

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to package (e.g. v1.0.0)'
        required: true

permissions:
  contents: read

jobs:
  ppa:
    if: vars.ENABLE_PPA == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Target Ubuntu series — only CURRENTLY SUPPORTED ones (Launchpad
        # rejects uploads to EOL series) that ship a modern Rust (>= 1.77).
        # resolute = 26.04 LTS (current stable). noble (24.04) is intentionally
        # excluded: it ships rustc 1.75, which is too old for the build.
        series: [resolute]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install packaging tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput

      - name: Install Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g pnpm@9

      - name: Resolve version from tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Packaging OrbitalTerm $VERSION"
          node -e "for (const f of ['src-tauri/tauri.conf.json','package.json']) { const j=require('./'+f); j.version=process.argv[1]; require('fs').writeFileSync(f, JSON.stringify(j, null, 2) + '\n'); }" "$VERSION"

      - name: Build frontend (dist/)
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Vendor Rust crates (offline build on Launchpad)
        run: |
          mkdir -p .cargo
          cargo vendor --manifest-path src-tauri/Cargo.toml --locked vendor > .cargo/config.toml

      - name: Import GPG signing key
        env:
          GPG_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\n' >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true
          echo "$GPG_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')
          echo "DEBSIGN_KEYID=$KEYID" >> "$GITHUB_ENV"
          # Cache the passphrase in the agent so debuild can sign non-interactively.
          gpg-connect-agent reloadagent /bye
          for KG in $(gpg --batch --with-colons --with-keygrip --list-secret-keys | awk -F: '$1=="grp"{print $10}'); do
            /usr/lib/gnupg/gpg-preset-passphrase --preset --passphrase "$PASSPHRASE" "$KG"
          done

      - name: Assemble debian/ for ${{ matrix.series }}
        env:
          DEBEMAIL: ${{ secrets.PPA_MAINTAINER }}
        run: |
          rm -rf debian
          cp -r packaging/ppa/debian ./debian
          rm -f debian/changelog
          # 3.0 (native) versions must NOT contain a hyphen — use '+' for the
          # PPA marker and '~series' so each series upload is unique. The run
          # number keeps the version strictly increasing so retries aren't
          # rejected by Launchpad as "version already exists".
          DEBFULLNAME="OrbitalTerm" dch --create --package orbitalterm \
            -v "${VERSION}+ppa${{ github.run_number }}~${{ matrix.series }}1" \
            --distribution "${{ matrix.series }}" \
            "Automated PPA build of ${VERSION} for ${{ matrix.series }}."

      - name: Build signed source package
        run: |
          # node_modules is no longer needed (dist/ is already built) and we no
          # longer tar-ignore it, so drop it to keep the source tarball lean.
          rm -rf node_modules
          # debuild options (--no-lintian) MUST come before dpkg-buildpackage
          # options (-S …); the passphrase is cached in the gpg-agent above.
          debuild --no-lintian -S -d -k"${DEBSIGN_KEYID}"

      - name: Upload to the PPA
        run: |
          dput "ppa:${{ secrets.PPA_NAME }}" ../orbitalterm_*_source.changes
