name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create (or reuse) a SINGLE draft release first, so the parallel build jobs
  # below upload their assets to the same release instead of racing to each
  # create their own draft (drafts are NOT deduplicated by tag on GitHub, which
  # is what produced two "v0.1.0" drafts before).
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Create or reuse the draft release
        uses: actions/github-script@v7
        id: create-release
        with:
          result-encoding: string
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner, repo, per_page: 100,
            });
            let release = releases.find((r) => r.tag_name === tag);
            if (!release) {
              const body = `## OrbitalTerm ${tag}\n\n`
                + 'The installers are being built — the download table and '
                + 'checksums will appear here automatically when the build finishes.';
              const res = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: `OrbitalTerm ${tag}`,
                body,
                draft: true,
                prerelease: false,
              });
              release = res.data;
            }
            return release.id.toString();

  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # The git tag (e.g. v0.2.0) is the single source of truth for the app
      # version: stamp it into tauri.conf.json + package.json so installers and
      # the in-app version follow the tag automatically on every release.
      - name: Sync version with the tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building OrbitalTerm $VERSION (tag $GITHUB_REF_NAME)"
          node -e "for (const f of ['src-tauri/tauri.conf.json','package.json']) { const j=require('./'+f); j.version=process.argv[1]; require('fs').writeFileSync(f, JSON.stringify(j, null, 2) + '\n'); }" "$VERSION"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Windows dependencies
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install strawberryperl -y
          refreshenv

      - name: Build OrbitalRdpHost.exe
        shell: cmd
        run: |
          set "CSC="
          for %%d in (
            "%WINDIR%\Microsoft.NET\Framework64\v4.0.30319"
            "%WINDIR%\Microsoft.NET\Framework\v4.0.30319"
          ) do (
            if exist "%%~d\csc.exe" (
              set "CSC=%%~d\csc.exe"
              goto :found
            )
          )
          echo ERROR: csc.exe not found
          exit /b 1
          :found
          echo Using: %CSC%
          "%CSC%" /nologo /target:exe /platform:x64 /optimize+ ^
            /out:src-tauri\OrbitalRdpHost.exe ^
            /r:System.dll /r:System.Core.dll /r:System.Drawing.dll ^
            /r:System.Windows.Forms.dll /r:Microsoft.CSharp.dll ^
            csharp-rdp-host\Program.cs
          if %ERRORLEVEL% neq 0 ( echo BUILD FAILED & exit /b %ERRORLEVEL% )
          echo BUILD OK: src-tauri\OrbitalRdpHost.exe

      - name: Install frontend dependencies
        run: pnpm install

      - name: Write Windows bundle config
        shell: bash
        run: |
          echo '{"bundle":{"resources":{"OrbitalRdpHost.exe":"OrbitalRdpHost.exe"}}}' \
            > src-tauri/tauri.windows.conf.json

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---------------------------------------------------------------------------
  # Linux — FreeRDP 3 (Ubuntu 25.04 "plucky", 26.04 "resolute" and newer)
  #
  # Built inside an ubuntu:26.04 container because the GitHub-hosted ubuntu
  # runners (24.04) only ship FreeRDP 2 in their repos. build.rs probes
  # freerdp3 first, so it links against FreeRDP 3 here, and the .deb depends
  # (already set to libfreerdp3-3 in tauri.conf.json) match the binary.
  #
  # These artifacts keep the DEFAULT names (no suffix), e.g.
  #   OrbitalTerm_<v>_amd64.deb / .AppImage / .rpm
  # ---------------------------------------------------------------------------
  build-linux-freerdp3:
    needs: create-release
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    steps:
      # The base image is minimal: install everything the build (and the
      # JS-based GitHub Actions that follow) need before checking out.
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git curl wget file ca-certificates xz-utils unzip \
            build-essential pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev \
            librsvg2-dev patchelf \
            freerdp3-dev libwinpr3-dev

      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync version with the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building OrbitalTerm $VERSION (tag $GITHUB_REF_NAME)"
          node -e "for (const f of ['src-tauri/tauri.conf.json','package.json']) { const j=require('./'+f); j.version=process.argv[1]; require('fs').writeFileSync(f, JSON.stringify(j, null, 2) + '\n'); }" "$VERSION"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build (FreeRDP 3, no upload)
        uses: tauri-apps/tauri-action@v0
        # No releaseId → tauri-action only builds; we rename + upload below so
        # the artifacts carry a clear "_freerdp3" suffix.

      - name: Add "_support_freerdp3" suffix to the artifacts
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          shopt -s nullglob
          for f in deb/*.deb rpm/*.rpm appimage/*.AppImage; do
            ext="${f##*.}"
            dir="$(dirname "$f")"
            base="$(basename "$f" ".$ext")"
            case "$base" in *_support_freerdp3) continue;; esac
            mv "$f" "$dir/${base}_support_freerdp3.${ext}"
            echo "Renamed -> $dir/${base}_support_freerdp3.${ext}"
          done

      - name: Upload FreeRDP 3 assets to the release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const release_id = ${{ needs.create-release.outputs.release_id }};
            const { owner, repo } = context.repo;
            const base = 'src-tauri/target/release/bundle';
            const existing = await github.paginate(
              github.rest.repos.listReleaseAssets, { owner, repo, release_id });
            for (const d of ['deb', 'rpm', 'appimage']) {
              const full = path.join(base, d);
              if (!fs.existsSync(full)) continue;
              for (const name of fs.readdirSync(full)) {
                if (!/\.(deb|rpm|AppImage)$/.test(name)) continue;
                const file = path.join(full, name);
                const dup = existing.find((a) => a.name === name);
                if (dup) {
                  console.log('Replacing existing asset', name);
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: dup.id });
                }
                console.log('Uploading', name);
                await github.rest.repos.uploadReleaseAsset({
                  owner, repo, release_id, name,
                  data: fs.readFileSync(file),
                });
              }
            }

  # ---------------------------------------------------------------------------
  # Linux — FreeRDP 2 (Ubuntu 24.04 and older)
  #
  # The GitHub-hosted ubuntu-24.04 runner only has FreeRDP 2, so build.rs links
  # against it. The .deb depends must therefore be rewritten to the FreeRDP 2
  # runtime packages (the default config targets FreeRDP 3).
  #
  # tauri-action runs WITHOUT releaseId (build only); we rename the artifacts
  # with an "_ubuntu24.04" suffix and upload them ourselves so they don't
  # collide with the FreeRDP 3 artifacts on the same release.
  # ---------------------------------------------------------------------------
  build-linux-freerdp2:
    needs: create-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync version with the tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building OrbitalTerm $VERSION (tag $GITHUB_REF_NAME)"
          node -e "for (const f of ['src-tauri/tauri.conf.json','package.json']) { const j=require('./'+f); j.version=process.argv[1]; require('fs').writeFileSync(f, JSON.stringify(j, null, 2) + '\n'); }" "$VERSION"

      # This build links FreeRDP 2, so the .deb must depend on the FreeRDP 2
      # runtime libraries instead of the FreeRDP 3 ones in the default config.
      - name: Point .deb dependencies at FreeRDP 2
        shell: bash
        run: |
          node -e "const f='src-tauri/tauri.conf.json'; const j=require('./'+f); j.bundle.linux.deb.depends=['libwebkit2gtk-4.1-0','libgtk-3-0','libfreerdp-client2-2','libfreerdp2-2','libwinpr2-2','wl-clipboard']; require('fs').writeFileSync(f, JSON.stringify(j, null, 2) + '\n');"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies (FreeRDP 2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            freerdp2-dev \
            libwinpr2-dev \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build (FreeRDP 2, no upload)
        uses: tauri-apps/tauri-action@v0
        # No releaseId → tauri-action only builds; we upload renamed assets below.

      - name: Add "_support_freerdp2" suffix to the artifacts
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          shopt -s nullglob
          for f in deb/*.deb rpm/*.rpm appimage/*.AppImage; do
            ext="${f##*.}"
            dir="$(dirname "$f")"
            base="$(basename "$f" ".$ext")"
            case "$base" in *_support_freerdp2) continue;; esac
            mv "$f" "$dir/${base}_support_freerdp2.${ext}"
            echo "Renamed -> $dir/${base}_support_freerdp2.${ext}"
          done

      - name: Upload FreeRDP 2 assets to the release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const release_id = ${{ needs.create-release.outputs.release_id }};
            const { owner, repo } = context.repo;
            const base = 'src-tauri/target/release/bundle';
            // Existing assets on the release, so re-runs don't fail with
            // "already_exists" — we delete a duplicate before re-uploading.
            const existing = await github.paginate(
              github.rest.repos.listReleaseAssets, { owner, repo, release_id });
            for (const d of ['deb', 'rpm', 'appimage']) {
              const full = path.join(base, d);
              if (!fs.existsSync(full)) continue;
              for (const name of fs.readdirSync(full)) {
                if (!/\.(deb|rpm|AppImage)$/.test(name)) continue;
                const file = path.join(full, name);
                const dup = existing.find((a) => a.name === name);
                if (dup) {
                  console.log('Replacing existing asset', name);
                  await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: dup.id });
                }
                console.log('Uploading', name);
                await github.rest.repos.uploadReleaseAsset({
                  owner, repo, release_id, name,
                  data: fs.readFileSync(file),
                });
              }
            }

  # ---------------------------------------------------------------------------
  # Finalize — once all platforms have uploaded their assets, rewrite the
  # release notes with a per-platform "which file" guide plus an auto-generated
  # download table (direct links + SHA-256), RustDesk-style.
  # ---------------------------------------------------------------------------
  finalize-release:
    needs: [create-release, build-windows, build-linux-freerdp3, build-linux-freerdp2]
    runs-on: ubuntu-latest
    steps:
      - name: Generate download table with checksums
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const tag = context.ref.replace('refs/tags/', '');
            const { owner, repo } = context.repo;
            const release_id = ${{ needs.create-release.outputs.release_id }};

            // Build download URLs deterministically from the TAG. The asset's
            // own browser_download_url uses a temporary "untagged-<id>" slug
            // while the release is still a draft, which 404s once published —
            // the tag-based URL is correct for the published release.
            const dlBase = `https://github.com/${owner}/${repo}/releases/download/${tag}`;
            const dl = (name) => `${dlBase}/${encodeURIComponent(name)}`;

            const assets = await github.paginate(
              github.rest.repos.listReleaseAssets, { owner, repo, release_id });

            // Compute SHA-256 for every uploaded asset by hashing its bytes.
            const rows = [];
            for (const a of assets) {
              const res = await github.request(
                'GET /repos/{owner}/{repo}/releases/assets/{asset_id}',
                { owner, repo, asset_id: a.id, headers: { accept: 'application/octet-stream' } });
              const sha = crypto.createHash('sha256').update(Buffer.from(res.data)).digest('hex');
              const mb = (a.size / (1024 * 1024)).toFixed(1);
              rows.push({ name: a.name, url: dl(a.name), sha, mb });
            }
            rows.sort((x, y) => x.name.localeCompare(y.name));

            // Direct-link helpers for the compact download table (RustDesk-style).
            const find = (re) => assets.find((a) => re.test(a.name));
            const link = (a, label) =>
              a ? `[${label}](${dl(a.name)})` : '—';
            const winMsi = find(/\.msi$/);
            const winExe = find(/-setup\.exe$/) || find(/\.exe$/);
            const deb3 = find(/_support_freerdp3\.deb$/),  deb2 = find(/_support_freerdp2\.deb$/);
            const rpm3 = find(/_support_freerdp3\.rpm$/),  rpm2 = find(/_support_freerdp2\.rpm$/);
            const app3 = find(/_support_freerdp3\.AppImage$/), app2 = find(/_support_freerdp2\.AppImage$/);

            const downloads = [
              '| Plataforma / Platform | Descarga / Download |',
              '|---|---|',
              `| **Windows** | ${link(winMsi, 'MSI ⭐')} · ${link(winExe, 'EXE')} |`,
              `| **Linux** · Debian / Ubuntu / Mint (\`.deb\`) | ${link(deb3, 'FreeRDP 3')} · ${link(deb2, 'FreeRDP 2')} |`,
              `| **Linux** · Fedora / RHEL / openSUSE (\`.rpm\`) | ${link(rpm3, 'FreeRDP 3')} · ${link(rpm2, 'FreeRDP 2')} |`,
              `| **Linux** · AppImage (cualquier distro) | ${link(app3, 'FreeRDP 3')} · ${link(app2, 'FreeRDP 2')} |`,
            ].join('\n');

            const checksums = rows.map(
              (r) => `| [${r.name}](${r.url}) | ${r.mb} MB | \`${r.sha}\` |`).join('\n');

            const body = [
              `## OrbitalTerm ${tag}`,
              '',
              '### Descargas / Downloads',
              '',
              downloads,
              '',
              '<sub>⭐ recomendado / recommended. **¿FreeRDP 2 o 3?** Distros nuevas (Ubuntu 25.04+, Debian 13+, Fedora 40+) → **3**; antiguas (Ubuntu 24.04 y anteriores, Debian 12, Mint 22, Fedora 39 y anteriores) → **2**. ¿Dudas? Ejecuta `ldconfig -p | grep -E "libfreerdp(2|3)"`.</sub>',
              '',
              '<details><summary>🔒 SHA-256 checksums</summary>',
              '',
              '| Archivo / File | Tamaño / Size | SHA-256 |',
              '|---|---|---|',
              checksums,
              '',
              '</details>',
              '',
              '<sub>Windows builds are code-signed with a free certificate provided by the [SignPath Foundation](https://signpath.org) (CA: [Certum](https://www.certum.eu)).</sub>',
            ].join('\n');

            await github.rest.repos.updateRelease({ owner, repo, release_id, body });
            console.log('Updated release body with', rows.length, 'assets.');
