name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            freerdp2-dev \
            libwinpr2-dev \
            libssl-dev \
            pkg-config

      - name: Install Windows dependencies
        if: matrix.platform == 'windows-latest'
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install strawberryperl -y
          refreshenv

      - name: Build OrbitalRdpHost.exe (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: cmd
        run: |
          set "CSC="
          for %%d in (
            "%WINDIR%\Microsoft.NET\Framework64\v4.0.30319"
            "%WINDIR%\Microsoft.NET\Framework\v4.0.30319"
          ) do (
            if exist "%%~d\csc.exe" (
              set "CSC=%%~d\csc.exe"
              goto :found
            )
          )
          echo ERROR: csc.exe not found
          exit /b 1
          :found
          echo Using: %CSC%
          "%CSC%" /nologo /target:exe /platform:x64 /optimize+ ^
            /out:src-tauri\OrbitalRdpHost.exe ^
            /r:System.dll /r:System.Core.dll /r:System.Drawing.dll ^
            /r:System.Windows.Forms.dll /r:Microsoft.CSharp.dll ^
            csharp-rdp-host\Program.cs
          if %ERRORLEVEL% neq 0 ( echo BUILD FAILED & exit /b %ERRORLEVEL% )
          echo BUILD OK: src-tauri\OrbitalRdpHost.exe

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: OrbitalTerm ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download for your platform.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
