<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="otRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b026d6"/>
      <stop offset="0.55" stop-color="#7b2bd6"/>
      <stop offset="1" stop-color="#3535ea"/>
    </linearGradient>
    <linearGradient id="otOrbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b27d9"/>
      <stop offset="1" stop-color="#3535ea"/>
    </linearGradient>
    <style>
      #otPlanet{animation:otGlow 3.5s ease-in-out infinite}
      @keyframes otGlow{0%,100%{filter:drop-shadow(0 0 1px rgba(124,77,255,.25))}50%{filter:drop-shadow(0 0 5px rgba(124,77,255,.7))}}
      @media (prefers-reduced-motion:reduce){#otPlanet{animation:none}}
    </style>
  </defs>
  <g transform="rotate(-39.9 200.5 207.5)">
    <path id="rp" d="M20.5 207.5 A180 55 0 1 1 380.5 207.5 A180 55 0 1 1 20.5 207.5" fill="none"/>
    <path d="M20.5 207.5 A180 55 0 1 1 380.5 207.5 A180 55 0 1 1 20.5 207.5" fill="none" stroke="url(#otOrbit)" stroke-width="6" stroke-linecap="round"/>
  </g>
  <g id="otPlanet">
    <path d="M295.7 151.4 A104 104 0 0 1 130.4 269.3" fill="none" stroke="url(#otRing)" stroke-width="25" stroke-linecap="round"/>
    <path d="M101.1 224.1 A104 104 0 0 1 262.6 108.9" fill="none" stroke="url(#otRing)" stroke-width="25" stroke-linecap="round"/>
    <g fill="none" stroke="#f5f5f7" stroke-width="11" stroke-linecap="round" stroke-linejoin="round">
      <path d="M171 165 L196 192 L171 219"/>
      <path d="M205 213 L233 213"/>
    </g>
  </g>
  <g transform="rotate(-39.9 200.5 207.5)">
    <circle r="17" fill="#A121D9"><animateMotion dur="16s" repeatCount="indefinite"><mpath xlink:href="#rp"/></animateMotion></circle>
    <circle r="15" fill="#3235F2"><animateMotion dur="16s" begin="-8s" repeatCount="indefinite"><mpath xlink:href="#rp"/></animateMotion></circle>
  </g>
</svg>
